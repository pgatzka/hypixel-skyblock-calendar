name: gates
"on":
  push:
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail if instance is not configured
        run: |
          export CLAUDE_PROJECT_DIR="$PWD"
          sh scripts/check-config.sh

      # === THE ONE PER-PROJECT BLOCK ===
      # Monorepo: Spring Boot (Maven, root pom.xml) backend + React/Vite/TS frontend.
      # ubuntu-latest provides a Docker daemon for io.fabric8:docker-maven-plugin (real DB in IT).
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run declared gates (clean machine)
        # Sonar (the lint gate) needs these; set the SONAR_TOKEN repo secret and sonar.host.url.
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          export CLAUDE_PROJECT_DIR="$PWD"
          . .claude/hooks/_lib.sh
          # CI runs verification gates only (format is a local auto-fixer).
          for g in lint typecheck test build; do
            invoke_gate "$g" || { echo "Gate '$g' failed"; exit 1; }
          done
